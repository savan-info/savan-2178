<style>

:root {
            --primary-purple: #7b61ff;
            --light-bg: #f5f7fb;
            --text-dark: #333;
            --correct-green: #10b981;
            --wrong-red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

	 .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 10px;
    font-size: 12px;
    font-weight: bold;
    z-index: 1000;
}
        .container {
            width: 95%;
            max-width: 1000px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* Top Bar */
        .top-header {
            background: white;
            padding: 15px 30px;
            border-bottom: 3px solid var(--primary-purple);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-accent {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 60px;
            background: var(--primary-purple);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .q-number-circle {
            background: rgba(255,255,255,0.2);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .quiz-content {
            margin-left: 60px;
            padding: 40px;
        }

        h1.main-title {
            color: var(--primary-purple);
            text-align: center;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 22px;
            line-height: 1.5;
            color: var(--text-dark);
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* Options Grid */
        .options-container {
            display: grid;
            gap: 15px;
            max-width: 600px;
            margin-left: auto;
        }

        .option-row {
            display: flex;
            align-items: stretch;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .option-row:hover {
            transform: translateX(5px);
        }

        .option-letter {
            background: #94a3b8;
            color: white;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            border-radius: 10px 0 0 10px;
            transition: background 0.3s;
        }

        .option-text {
            flex-grow: 1;
            padding: 15px 25px;
            border: 2px solid #e2e8f0;
            border-left: none;
            border-radius: 0 10px 10px 0;
            font-size: 18px;
            background: white;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        /* Feedback Colors */
        .correct .option-letter { background: var(--correct-green) !important; }
        .correct .option-text { border-color: var(--correct-green); background: #f0fdf4; }

        .wrong .option-letter { background: var(--wrong-red) !important; }
        .wrong .option-text { border-color: var(--wrong-red); background: #fef2f2; }

        /* Navigation Buttons */
        .nav-container {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            max-width: 600px;
            margin-left: auto;
        }

        .nav-btn {
            background: var(--primary-purple);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.3s;
        }

        .nav-btn:hover {
            opacity: 0.9;
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Progress Bar */
        .progress-container {
            height: 6px;
            background: #e2e8f0;
            position: absolute;
            bottom: 0;
            left: 60px;
            right: 0;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary-purple);
            width: 0%;
            transition: width 0.3s;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .topic-btn {
            background: white;
            border: 2px solid var(--primary-purple);
            color: var(--primary-purple);
            padding: 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .topic-btn:hover {
            background: var(--primary-purple);
            color: white;
            box-shadow: 0 5px 15px rgba(123, 97, 255, 0.3);
        }

        .home-btn {
            background: #444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

</style>
</head>

// Variable initialization
let currentQuestions = [];
let currentIndex = 0;
let userAnswers = []; // Answers store karne ke liye array

function loadQuiz(topic) {
    currentQuestions = quizzes[topic];
    currentIndex = 0;
    userAnswers = new Array(currentQuestions.length).fill(null); // Array reset karein

    document.getElementById("topicPage").style.display = "none";
    document.getElementById("quizPage").style.display = "block";
    document.getElementById("sidebar").style.display = "flex";
    document.getElementById("navControls").style.display = "flex";
    document.getElementById("quizTitle").innerText = topic.toUpperCase();
    
    showQuestion();
}

function showQuestion() {
    const qData = currentQuestions[currentIndex];
    document.getElementById("qNumber").innerText = currentIndex + 1;
    
    // Previous button visibility
    document.getElementById("prevBtn").style.visibility = (currentIndex === 0) ? "hidden" : "visible";
    
    // Next button text logic
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.innerText = (currentIndex === currentQuestions.length - 1) ? "Finish" : "Next";

    let optionsHTML = "";
    const letters = ["A", "B", "C", "D"];
    
    qData.o.forEach((opt, i) => {
        let className = "option-row";
        
        // Agar user ne pehle hi answer de diya hai toh highlight karein
        if (userAnswers[currentIndex] !== null) {
            if (i === qData.a) className += " correct";
            if (i === userAnswers[currentIndex] && i !== qData.a) className += " wrong";
        }

        optionsHTML += `
            <div class="${className}" id="row${i}" onclick="checkAnswer(${i}, ${qData.a})">
                <div class="option-letter">${letters[i]}</div>
                <div class="option-text">${opt}</div>
            </div>
        `;
    });

    document.getElementById("questionBox").innerHTML = `
        <div class="question-text">${qData.q}</div>
        <div class="options-container">
            ${optionsHTML}
        </div>
    `;

    updateProgress();
}

function checkAnswer(selected, correct) {
    // Agar question answered nahi hai toh answer set karein
    if (userAnswers[currentIndex] === null) {
        userAnswers[currentIndex] = selected;
        showQuestion(); // UI update karein feedback dikhane ke liye
    }
}

function nextQuestion() {
    if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        showQuestion();
    } else {
        showResult();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        showQuestion();
    }
}

function updateProgress() {
    let percent = (currentIndex / currentQuestions.length) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
}

function showResult() {
    // Score calculate karein
    let finalScoreCount = 0;
    userAnswers.forEach((ans, idx) => {
        if (ans === currentQuestions[idx].a) finalScoreCount++;
    });

    document.getElementById("questionBox").style.display = "none";
    document.getElementById("navControls").style.display = "none";
    document.getElementById("sidebar").style.display = "none";
    document.getElementById("resultArea").style.display = "block";
    document.getElementById("finalScore").innerHTML = `Quiz Completed!<br>Score: ${finalScoreCount} / ${currentQuestions.length}`;
}

function goHome() {
    document.getElementById("quizPage").style.display = "none";
    document.getElementById("sidebar").style.display = "none";
    document.getElementById("topicPage").style.display = "block";
    document.getElementById("questionBox").style.display = "block";
    document.getElementById("resultArea").style.display = "none";
}

</script>
